<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deksiak - Social Media</title>
    <style>
        /* Reset podstawowych styli */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Tło z fioletem przebijającym się z czerwonym */
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #2b004f 0%, #4a154b 40%, #b31033 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            padding: 20px;
        }

        /* Główny kontener strony */
        .container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Styl nagłówka / nazwy */
        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        p.subtitle {
            font-size: 1rem;
            color: #e0e0e0;
            margin-bottom: 30px;
        }

        /* Kontener na przyciski */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Styl pojedynczego przycisku (linku) */
        .social-link {
            display: block;
            text-decoration: none;
            color: #ffffff;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Kolory dedykowane dla konkretnych socialów */
        .youtube {
            background: rgba(255, 0, 0, 0.25);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
        }
        .youtube:hover {
            background: rgba(255, 0, 0, 0.45);
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.4);
        }

        .discord {
            background: rgba(88, 101, 242, 0.25);
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.2);
        }
        .discord:hover {
            background: rgba(88, 101, 242, 0.45);
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(88, 101, 242, 0.4);
        }

        /* Stopka */
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Deksiak</h1>
        <p class="subtitle">Moje oficjalne linki społecznościowe</p>

        <div class="links-container">
            <!-- Link do YouTube -->
            <a href="https://www.youtube.com/channel/UCWxzXaH60G-j1BbQwKYp_xg" target="_blank" class="social-link youtube">
                YouTube
            </a>

            <!-- Miejsce na Discorda – możesz zmienić '#' na swój prawdziwy link zaproszenia -->
            <a href="#" target="_blank" class="social-link discord">
                Discord
            </a>
        </div>

        <div class="footer">
            &copy; 2026 Deksiak. Wszelkie prawa zastrzeżone.
        </div>
    </div>

</body>
</html>
